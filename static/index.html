<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self' https://cdn.merakianalytics.com; img-src 'self' https: data:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>League of Legends Challenges Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="window-drag-bar">
      <img class="window-drag-icon" src="assets/tracker.png" alt="" aria-hidden="true" />
      <span id="window-drag-title" class="window-drag-title">League of Legends Challenges Tracker</span>
    </div>
    <main class="page">
      <div class="top-panels">
        <header class="hero">
          <div class="hero-main">
            <article id="summoner-card" class="summoner-card is-disconnected" aria-live="polite">
              <div class="summoner-settings">
                <button
                  id="settings-button"
                  class="settings-button"
                  type="button"
                  aria-label="Ouvrir les options"
                  aria-expanded="false"
                  aria-controls="settings-panel"
                >
                  &#9881;
                </button>
                <aside id="settings-panel" class="settings-panel" hidden>
                  <fieldset id="language-group" class="language-group" role="group">
                    <label class="language-option">
                      <input type="radio" name="language" value="fr" />
                      <span>FR</span>
                    </label>
                    <label class="language-option">
                      <input type="radio" name="language" value="en" />
                      <span>EN</span>
                    </label>
                  </fieldset>
                  <h2 class="settings-title">Application</h2>
                  <p class="settings-row"><span id="settings-version-label">Version</span>: <strong id="app-version">-</strong></p>
                  <p class="settings-row"><span id="settings-update-label">Update</span>: <span id="update-status">Idle</span></p>
                  <label class="settings-switch toggle-filter" for="summoner-bg-toggle">
                    <input id="summoner-bg-toggle" type="checkbox" />
                    <span class="toggle-filter-switch" aria-hidden="true"></span>
                    <span id="summoner-bg-label" class="toggle-filter-label">Lux Mode</span>
                  </label>
                  <button id="check-update-button" type="button" class="settings-action-button">
                    Check for updates
                  </button>
                </aside>
              </div>
              <img
                id="summoner-icon"
                class="summoner-icon"
                src="https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/profile-icons/29.jpg"
                alt="Summoner icon"
              />
              <div class="summoner-meta">
                <p id="summoner-state" class="summoner-state">Not connected</p>
                <h2 id="summoner-name" class="summoner-name">Unknown Summoner</h2>
                <p id="summoner-level" class="summoner-level">Level --</p>
              </div>
            </article>

            <section class="section filters-section" aria-labelledby="filters-title">
              <h2 id="filters-title">Filtres</h2>
              <label class="challenge-control" for="challenge-select">
                <span id="challenge-label">Challenge</span>
                <select id="challenge-select">
                  <option value=""></option>
                </select>
                <button id="refresh-challenge" type="button" aria-label="Refresh challenge">&#x21BB;</button>
                <p id="challenge-description" class="challenge-description" hidden></p>
              </label>
              <div class="filters-top">
                <div class="positions-field">
                  <div id="position-buttons" class="position-buttons" role="group" aria-label="Positions">
                    <button type="button" class="position-btn" data-position="TOP" aria-label="Top">
                      <img class="position-icon" src="assets/top.png" alt="" aria-hidden="true" />
                    </button>
                    <button type="button" class="position-btn" data-position="JUNGLE" aria-label="Jungle">
                      <img class="position-icon" src="assets/jungle.png" alt="" aria-hidden="true" />
                    </button>
                    <button type="button" class="position-btn" data-position="MIDDLE" aria-label="Mid">
                      <img class="position-icon" src="assets/mid.png" alt="" aria-hidden="true" />
                    </button>
                    <button type="button" class="position-btn" data-position="BOTTOM" aria-label="Bot">
                      <img class="position-icon" src="assets/bot.png" alt="" aria-hidden="true" />
                    </button>
                    <button type="button" class="position-btn" data-position="UTILITY" aria-label="Support">
                      <img class="position-icon" src="assets/support.png" alt="" aria-hidden="true" />
                    </button>
                  </div>
                </div>

                <label class="filter-field search-field" for="champion-search">
                  <input id="champion-search" type="search" placeholder="Nom du champion" />
                </label>
              </div>
              <label class="toggle-filter" for="hide-completed-toggle">
                <input id="hide-completed-toggle" type="checkbox" />
                <span class="toggle-filter-switch" aria-hidden="true"></span>
                <span id="hide-completed-label" class="toggle-filter-label">Cacher les champions réussis</span>
              </label>
            </section>
          </div>

          <div class="hero-side">
            <article id="selected-champion-card" class="selected-champion-card is-empty" aria-live="polite">
              <div class="selected-champion-head">
                <div id="selected-champion-icon-frame" class="selected-champion-icon-frame is-pending">
                  <img
                    id="selected-champion-icon"
                    class="selected-champion-icon"
                    src="assets/default.png"
                    alt=""
                  />
                  <span id="selected-champion-status" class="selected-champion-status" aria-hidden="true">?</span>
                </div>
                <div class="selected-champion-meta">
                  <h2 id="selected-champion-name" class="selected-champion-name">Aucun champion</h2>
                  <p id="selected-champion-title" class="selected-champion-title"></p>
                </div>
              </div>
              <div class="selected-champion-modes">
                <section class="mode-stat-panel" aria-labelledby="selected-champion-aram-title">
                  <h3 id="selected-champion-aram-title" class="mode-stat-title">ARAM</h3>
                  <ul id="selected-champion-aram-stats" class="mode-stat-list"></ul>
                </section>
                <section class="mode-stat-panel" aria-labelledby="selected-champion-urf-title">
                  <h3 id="selected-champion-urf-title" class="mode-stat-title">URF</h3>
                  <ul id="selected-champion-urf-stats" class="mode-stat-list"></ul>
                </section>
                <section id="selected-champion-arena-panel" class="mode-stat-panel arena-changes-panel" aria-labelledby="selected-champion-arena-title">
                  <div class="mode-stat-header">
                    <h3 id="selected-champion-arena-title" class="mode-stat-title">Arena</h3>
                    <button
                      id="selected-champion-arena-toggle"
                      class="mode-stat-toggle"
                      type="button"
                      aria-label="Replier la section Arena"
                      aria-expanded="true"
                      aria-controls="selected-champion-arena-stats"
                    >v</button>
                  </div>
                  <ul id="selected-champion-arena-stats" class="arena-changes-list"></ul>
                </section>
              </div>
            </article>
          </div>
        </header>
      </div>

      <section class="section" aria-labelledby="collection-title">
        <h2 id="collection-title">Collection</h2>
        <h3 id="crowd-favorite-title" class="subsection-title">Crowd Favorite</h3>
        <ul id="crowd-favorite-list" class="image-grid featured-grid featured-grid-in-collection"></ul>
        <ul id="collection-list" class="image-grid all-grid"></ul>
      </section>

    </main>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
